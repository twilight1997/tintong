
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video and Text Message</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 400px; /* A common max-width for vertical videos on mobile */
            padding-bottom: 177.77%; /* For 9:16 aspect ratio (vertical video) */
            height: 0;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid #555;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>Ahaaa!</h1>
    <div class="video-container">
        <iframe
            src="https://www.youtube.com/embed/xBkOCM2JzLk?autoplay=1&controls=0&loop=1&playlist=xBkOCM2JzLk"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share; fullscreen"
            allowfullscreen
        ></iframe>
    </div>
    <p>Gotcha!</p>
</body>
</html>
