<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video and Text Message</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        video {
            max-width: 90%;
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            border: 2px solid #555;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <h1>Ahaaa!</h1>
    <video controls autoplay muted playsinline>
        <source src="https://www.youtube.com/shorts/xBkOCM2JzLk" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <p>Gotcha!</p>
</body>
</html>
